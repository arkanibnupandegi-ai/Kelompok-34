<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CusLapang</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: #e5e7eb;
}

/* CONTAINER */
.container {
  max-width: 1200px;
  margin: auto;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 0;
}

.navbar ul {
  display: flex;
  gap: 30px;
  list-style: none;
}

.navbar a {
  text-decoration: none;
  color: #1f2937;
  font-size: 14px;
}

.signup {
  background: #0F766E;
  color: white;
  padding: 8px 18px;
  border-radius: 20px;
}

/* HERO */
.hero {
  margin-top: 10px;
  border-radius: 20px;
  overflow: hidden;
  position: relative;
}

.hero img {
  width: 100%;
  height: 320px;
  object-fit: cover;
}

.hero-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to right, rgba(15,118,110,0.8), transparent);
}

.hero-text {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  left: 40px;
  color: white;
  max-width: 500px;
}

.hero-text h1 {
  font-size: 34px;
  line-height: 1.3;
  margin-bottom: 10px;
}

.hero-text p {
  font-size: 14px;
  margin-bottom: 15px;
}

.btn {
  background: white;
  color: #111;
  padding: 10px 18px;
  border-radius: 20px;
  font-size: 14px;
  text-decoration: none;
}

/* CATEGORY */
.category {
  margin-top: 30px;
}

.category h2 {
  font-size: 20px;
  margin-bottom: 20px;
}

/* CARD GRID */
.card-container {
  display: flex;
  justify-content: space-between;
  gap: 20px;
}

/* CARD */
.card {
  width: 260px;
  height: 230px;
  padding: 20px;
  border-radius: 16px;
  background: linear-gradient(135deg, #c7f9cc, #d9f99d);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.card h3 {
  font-size: 16px;
  color: #111;
}

/* PNG IMAGE SETTING */
.card img {
  width: 110px;
  height: 110px;
  object-fit: contain;
  align-self: center;
}

</style>
</head>

<body>

<div class="container">

  <!-- NAVBAR -->
  <div class="navbar">
    <h2>CUSLAPANG</h2>

    <ul>
      <li><a href="#">Home</a></li>
      <li><a href="#">Category</a></li>
      <li><a href="#">History</a></li>
      <li><a href="#">Contact</a></li>
    </ul>

    <a href="#" class="signup">Sign Up</a>
  </div>

  <!-- HERO -->
  <div class="hero">
    <img src="https://images.unsplash.com/photo-1521417531039-8c46b9c7c8c0">

    <div class="hero-overlay"></div>

    <div class="hero-text">
      <h1>Book Sports Fields Online,<br>Fast & Easy</h1>
      <p>No need to visit in person, everything can be done here.</p>
      <a href="#" class="btn">Book Now</a>
    </div>
  </div>

  <!-- CATEGORY -->
  <div class="category">
    <h2>What Do You Want to Play?</h2>

    <div class="card-container">

      <div class="card">
        <h3>Lapangan Futsal</h3>
        <img src="img/futsal.png" alt="futsal">
      </div>

      <div class="card">
        <h3>Lapangan Basket</h3>
        <img src="img/basket.png" alt="basket">
      </div>

      <div class="card">
        <h3>Lapangan Badminton</h3>
        <img src="img/badminton.png" alt="badminton">
      </div>

      <div class="card">
        <h3>Lapangan Voli</h3>
        <img src="img/voli.png" alt="voli">
      </div>

    </div>
  </div>

</div>

</body>
</html>
